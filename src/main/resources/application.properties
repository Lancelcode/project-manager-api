spring.application.name=project-manager-api

# Database - overridden by docker-compose environment variables in production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:projectdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}

# H2 for local development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Suppress open-in-view warning
spring.jpa.open-in-view=false